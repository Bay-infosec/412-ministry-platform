<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{announcement_title}}</title>
</head>
<body style="margin:0; padding:0; background:#FAFAFA;">
  <div style="display:none; max-height:0; overflow:hidden; opacity:0; color:transparent;">
    {{announcement_title}} from 412 MINISTRY
  </div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#FAFAFA;">
    <tr>
      <td align="center" style="padding:24px 12px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;">
          <tr>
            <td style="background:#1B2A4A; border-radius:18px 18px 0 0; padding:30px 28px;">
              <div style="font-family:Arial,Helvetica,sans-serif; font-size:11px; line-height:1; font-weight:800; letter-spacing:0.16em; color:#FF4D00;">
                412 MINISTRY
              </div>
              <div style="margin-top:12px; font-family:Arial,Helvetica,sans-serif; font-size:30px; line-height:1.15; font-weight:800; letter-spacing:-0.03em; color:#FFFFFF;">
                New announcement
              </div>
            </td>
          </tr>

          <tr>
            <td style="background:#FFFFFF; border:1px solid #E5E5E5; border-top:0; border-radius:0 0 18px 18px; padding:30px 28px;">
              <div style="font-family:Arial,Helvetica,sans-serif; font-size:10px; line-height:1; font-weight:800; letter-spacing:0.14em; color:#FF4D00;">
                UPDATE
              </div>
              <div style="margin-top:10px; font-family:Arial,Helvetica,sans-serif; font-size:24px; line-height:1.25; font-weight:800; letter-spacing:-0.02em; color:#111111;">
                {{announcement_title}}
              </div>
              <div style="margin-top:16px; font-family:Arial,Helvetica,sans-serif; font-size:15px; line-height:1.7; color:#374151; white-space:pre-line;">
                {{announcement_body}}
              </div>

              <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-top:28px;">
                <tr>
                  <td style="background:#FF4D00; border-radius:10px;">
                    <a href="{{platform_url}}" style="display:inline-block; padding:13px 24px; font-family:Arial,Helvetica,sans-serif; font-size:14px; line-height:1; font-weight:800; color:#FFFFFF; text-decoration:none;">
                      Open the app &rarr;
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding:20px 20px 4px; font-family:Arial,Helvetica,sans-serif; font-size:11px; line-height:1.6; color:#999999;">
              {{event_name}}<br>
              You received this update because you are part of the 412 MINISTRY platform.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
